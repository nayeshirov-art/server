workflows:
  ios-unsigned:
    name: Lawhi iOS (unsigned IPA)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.38.5
      xcode: latest
      cocoapods: default

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios
          pod install --repo-update

      - name: Build unsigned IPA
        script: |
          flutter build ipa --no-codesign
          mkdir -p build/ios/ipa
          cp build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app/../../../Info.plist build/ios/ipa/ 2>/dev/null || true
          cd build/ios/archive/Runner.xcarchive/Products/Applications
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../../ipa/lawhi.ipa Payload/
          rm -rf Payload

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - nayeshirov@gmail.com
        notify:
          success: true
          failure: true
