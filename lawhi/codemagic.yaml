workflows:
  ios-release:
    name: Lawhi iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.38.5
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: development
        bundle_identifier: com.lawhi.lawhi

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS IPA
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - nayeshirov@gmail.com
        notify:
          success: true
          failure: true
